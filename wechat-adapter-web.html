<script id="engine">
/* ================================================================
 * 微信公众号排版神器网页版 —— 纯前端转换引擎
 * 移植自 wechat-html-adapter (Python)。核心思路：借浏览器 getComputedStyle
 * 完成 CSS 级联/变量/媒体查询解析，再做微信兼容改写。
 * ================================================================ */
/* ---------- 颜色工具 ---------- */
const NAMED={black:[0,0,0],white:[255,255,255],red:[255,0,0],green:[0,128,0],blue:[0,0,255],yellow:[255,255,0],gray:[128,128,128],grey:[128,128,128],gold:[255,215,0],orange:[255,165,0],purple:[128,0,128],pink:[255,192,203],brown:[165,42,42],navy:[0,0,128],teal:[0,128,128],silver:[192,192,192],maroon:[128,0,0]};
function parseColor(tok){
  if(!tok)return null;
  let t=String(tok).trim().toLowerCase();
  if(t==='transparent'||t==='none')return null;
  if(NAMED[t])return[...NAMED[t],255];
  let m=t.match(/^#([0-9a-f]+)$/);
  if(m){let h=m[1];if(h.length===3||h.length===4)h=h.split('').map(c=>c+c).join('');
    if(h.length===8)return[parseInt(h.slice(0,2),16),parseInt(h.slice(2,4),16),parseInt(h.slice(4,6),16),parseInt(h.slice(6,8),16)];
    return[parseInt(h.slice(0,2),16),parseInt(h.slice(2,4),16),parseInt(h.slice(4,6),16),255];}
  m=t.match(/^rgba?\(\s*([\d.]+%?)\s*[, ]\s*([\d.]+%?)\s*[, ]\s*([\d.]+%?)\s*(?:[,/]\s*([\d.]+%?)\s*)?\)/);
  if(m){const v=x=>{x=x.trim();return x.endsWith('%')?Math.round(parseFloat(x)/100*255):Math.round(parseFloat(x));};
    let a=255;if(m[4]!=null){a=m[4].endsWith('%')?Math.round(parseFloat(m[4])/100*255):Math.round(parseFloat(m[4])*255);}
    return[v(m[1]),v(m[2]),v(m[3]),a];}
  return null;
}
function rgbaStr(c){if(!c)return null;const[r,g,b,a]=c;return a>=250?`rgb(${r}, ${g}, ${b})`:`rgba(${r}, ${g}, ${b}, ${(a/255).toFixed(2)})`;}
function averageColors(cs){if(!cs.length)return null;let r=0,g=0,b=0,a=0;for(const c of cs){r+=c[0];g+=c[1];b+=c[2];a+=(c[3]??255);}const n=cs.length;return rgbaStr([Math.round(r/n),Math.round(g/n),Math.round(b/n),Math.round(a/n)]);}
function extractColorsFromValue(v){const out=[];const re=/#[0-9a-f]{3,8}\b|rgba?\([^)]*\)/gi;let m;while((m=re.exec(v))){const c=parseColor(m[0]);if(c)out.push(c);}return out;}
function gradientToSolid(v){const cs=extractColorsFromValue(v);return cs.length?averageColors(cs):null;}

/* ---------- inline style 读写 ---------- */
function getDecl(el){const s=el.getAttribute&&el.getAttribute('style');const o={};if(!s)return o;for(const d of s.split(';')){const i=d.indexOf(':');if(i>0){o[d.slice(0,i).trim().toLowerCase()]=d.slice(i+1).trim();}}return o;}
function setDecl(el,d){const s=Object.entries(d).filter(([k,v])=>v!==''&&v!=null).map(([k,v])=>`${k}: ${v}`).join('; ');if(s)el.setAttribute('style',s);else el.removeAttribute('style');}
function renameTag(el,name){const doc=el.ownerDocument;const n=doc.createElement(name);for(const a of Array.from(el.attributes))n.setAttribute(a.name,a.value);while(el.firstChild)n.appendChild(el.firstChild);el.parentNode.replaceChild(n,el);return n;}
/* ---------- 步骤1：用 getComputedStyle 内联样式 ----------
 * 借浏览器把 <style>/class/变量/@media 全部解析成 computed 值，
 * 逐元素与「同标签默认元素」对比，仅内联有差异的白名单属性，避免膨胀。
 */
const INHERIT_PROPS=['color','font-size','font-weight','font-style','font-family','line-height','letter-spacing','text-align','text-indent','white-space'];
const SELF_PROPS=['background-color','border-radius','text-decoration-line','vertical-align',
  'margin-top','margin-right','margin-bottom','margin-left',
  'padding-top','padding-right','padding-bottom','padding-left','max-width'];
const SIDES=['top','right','bottom','left'];

function defaultStyleFor(win,doc,tag){
  defaultStyleFor._c=defaultStyleFor._c||{};
  if(defaultStyleFor._c[tag])return defaultStyleFor._c[tag];
  const e=doc.createElement(tag);e.style.cssText='';doc.body.appendChild(e);
  const cs=win.getComputedStyle(e);const snap={};
  [...INHERIT_PROPS,...SELF_PROPS].forEach(p=>snap[p]=cs.getPropertyValue(p));
  for(const s of SIDES){snap['border-'+s]=`${cs.getPropertyValue('border-'+s+'-width')}|${cs.getPropertyValue('border-'+s+'-style')}`;}
  doc.body.removeChild(e);
  defaultStyleFor._c[tag]=snap;return snap;
}
function borderShorthand(cs,side){
  const w=cs.getPropertyValue('border-'+side+'-width'),st=cs.getPropertyValue('border-'+side+'-style'),c=cs.getPropertyValue('border-'+side+'-color');
  if(!w||parseFloat(w)===0||st==='none'||!st)return null;
  return `${w} ${st} ${c}`;
}
function inlineComputed(win,doc){
  defaultStyleFor._c={};
  const all=Array.from(doc.body.querySelectorAll('*'));
  const plan=[];
  for(const el of all){
    const tag=el.tagName.toLowerCase();
    if(['script','style','link','meta','svg','br','hr','img','col','colgroup'].includes(tag)&&tag!=='img'){continue;}
    const cs=win.getComputedStyle(el);
    const def=defaultStyleFor(win,doc,tag);
    const d=getDecl(el);
    // 继承型排版属性：与默认(同样继承)不同才内联
    for(const p of INHERIT_PROPS){const v=cs.getPropertyValue(p);if(v&&v!==def[p]&&!d[p])d[p]=v;}
    // 自身型属性
    for(const p of SELF_PROPS){
      const v=cs.getPropertyValue(p);
      if(!v||v===def[p])continue;
      if(p==='background-color'){const c=parseColor(v);if(!c||c[3]===0)continue;d[p]=rgbaStr(c);continue;}
      if(p==='border-radius'&&(v==='0px'||v==='0px 0px 0px 0px'||v==='0%'))continue;
      if(p==='text-decoration-line'){if(v==='none')continue;d['text-decoration']=v;continue;}
      if(p.startsWith('margin')||p.startsWith('padding')){if(v==='0px')continue;}
      if(p==='max-width'&&v==='none')continue;
      d[p]=v;
    }
    // 边框（逐边，非 0 且非 none 才留）
    for(const s of SIDES){const bs=borderShorthand(cs,s);const cur=`${cs.getPropertyValue('border-'+s+'-width')}|${cs.getPropertyValue('border-'+s+'-style')}`;if(bs&&cur!==def['border-'+s])d['border-'+s]=bs;}
    // 背景渐变/背景图
    const bgi=cs.getPropertyValue('background-image');
    if(bgi&&bgi!=='none'){
      if(/gradient/i.test(bgi)){const solid=gradientToSolid(bgi);if(solid&&!d['background-color'])d['background-color']=solid;}
      else if(/url\(/i.test(bgi)){d['background-image']=bgi;const bp=cs.getPropertyValue('background-size');if(bp&&bp!=='auto')d['background-size']=bp;const bpos=cs.getPropertyValue('background-position');if(bpos&&bpos!=='0% 0%'&&bpos!=='0px 0px')d['background-position']=bpos;}
    }
    // display:flex/grid + 布局信息（供结构转换消费，稍后清理）
    const disp=cs.getPropertyValue('display');
    if(/^(inline-)?(flex|grid)$/.test(disp)){
      d['display']=disp.replace('inline-','');
      const gtc=cs.getPropertyValue('grid-template-columns');if(gtc&&gtc!=='none')d['grid-template-columns']=gtc;
      const jc=cs.getPropertyValue('justify-content');if(jc&&jc!=='normal')d['justify-content']=jc;
      const fd=cs.getPropertyValue('flex-direction');if(fd&&fd!=='row')d['flex-direction']=fd;
      const rg=cs.getPropertyValue('row-gap');if(rg&&rg!=='normal')d['row-gap']=rg;
      const cg=cs.getPropertyValue('column-gap');if(cg&&cg!=='normal')d['column-gap']=cg;
      const fw=cs.getPropertyValue('flex-wrap');if(fw&&fw!=='nowrap'&&fw!=='normal')d['flex-wrap']=fw;
    }
    plan.push([el,d]);
  }
  for(const[el,d]of plan)setDecl(el,d);
  return win.getComputedStyle(doc.body);
}
/* ---------- 步骤2：flex/grid -> 真 <table> 多列 ---------- */
function pxTracksToPercents(gtc){
  if(!gtc||gtc==='none')return null;
  const parts=gtc.trim().split(/\s+/).map(p=>parseFloat(p)).filter(n=>!isNaN(n));
  if(parts.length<1)return null;
  const total=parts.reduce((a,b)=>a+b,0);if(total<=0)return null;
  return parts.map(w=>(w/total*100).toFixed(2)+'%');
}
function flexGridToTable(doc){
  const els=Array.from(doc.body.querySelectorAll('*'));
  for(const el of els){
    const d=getDecl(el);const disp=d['display'];
    if(!disp||!/^(flex|grid)$/.test(disp))continue;
    // flex 纵向：等价 block，无需转表
    if(disp==='flex'&&(d['flex-direction']||'').startsWith('column')){
      ['display','flex-direction','justify-content','row-gap','column-gap','align-items','flex-wrap'].forEach(k=>delete d[k]);
      setDecl(el,d);continue;
    }
    let children=Array.from(el.children).filter(c=>!['SCRIPT','STYLE','BR'].includes(c.tagName));
    // 净化列表嵌套（li/ul 放进 td 非法，微信会重排破坏）
    children.forEach(c=>{if(['LI','DD','DT','UL','OL','DL'].includes(c.tagName))c=renameTag(c,'div');});
    children=Array.from(el.children).filter(c=>!['SCRIPT','STYLE','BR'].includes(c.tagName));
    let host=el;
    if(['OL','UL','DL'].includes(el.tagName))host=renameTag(el,'div');
    if(children.length===0){
      const d2=getDecl(host);
      if(d2['width']||d2['height']){d2['display']='inline-block';if(!d2['text-align'])d2['text-align']='center';if(d2['height']&&!d2['line-height'])d2['line-height']=d2['height'];}
      else delete d2['display'];
      ['flex-direction','justify-content','row-gap','column-gap','grid-template-columns','align-items','flex-wrap'].forEach(k=>delete d2[k]);
      setDecl(host,d2);continue;
    }
    const childVisual=ch=>{const cd=getDecl(ch);return cd['background-color']||cd['background']||cd['border']||cd['border-top']||cd['border-bottom']||cd['border-left']||cd['border-right'];};

      if(!isBadge)return false;
      const second=children[1];
      if(second){
        const sd=getDecl(second);
        const hasVis=sd['background-color']||sd['background']||sd['border']||sd['border-top']||sd['border-bottom']||sd['border-left']||sd['border-right'];
        return !hasVis; // 次子项无背景/边框才算文字标题
      }
      return true;
    })();
    if(isBadgeHeader){
      const table=doc.createElement('table');table.setAttribute('data-role','badge-header');
      setDecl(table,{'border-collapse':'collapse','width':'100%','table-layout':'fixed','margin':'24px 0 14px'});
      const tr=doc.createElement('tr');
      const td1=doc.createElement('td');
      td1.setAttribute('width','44');
      setDecl(td1,{'width':'44px','vertical-align':'middle','text-align':'center'});
      const badge=children[0];
      const bd=getDecl(badge);
      bd['display']='inline-block';bd['vertical-align']='middle';bd['text-align']='center';
      if(!bd['line-height']&&bd['height'])bd['line-height']=bd['height'];
      ['flex','flex-direction','justify-content','align-items','flex-wrap','grid-template-columns','row-gap','column-gap','gap'].forEach(k=>delete bd[k]);
      setDecl(badge,bd);
      td1.appendChild(badge);
      const td2=doc.createElement('td');
      setDecl(td2,{'vertical-align':'middle','padding-left':'12px'});
      const title=children[1];
      if(title){
        const tcd=getDecl(title);
        tcd['display']='block';tcd['white-space']='nowrap';
        ['flex','flex-direction','justify-content','align-items','flex-wrap','grid-template-columns','row-gap','column-gap'].forEach(k=>delete tcd[k]);
        setDecl(title,tcd);
        td2.appendChild(title);
      }
      const desc=children[2];

        td2.appendChild(doc.createElement('br'));
        const dcd=getDecl(desc);
        dcd['display']='block';dcd['white-space']='normal';
        ['flex','flex-direction','justify-content','align-items','flex-wrap','grid-template-columns','row-gap','column-gap','margin-left'].forEach(k=>delete dcd[k]);

        td2.appendChild(desc);

      d2['display']='block';
      setDecl(host,d2);

        const cd=getDecl(ch);
        ['flex','flex-direction','justify-content','align-items','flex-wrap','grid-template-columns','row-gap','column-gap','gap'].forEach(k=>delete cd[k]);
        cd['display']='inline-block';cd['vertical-align']='middle';cd['box-sizing']='border-box';

        if(!cd['word-break'])cd['word-break']='break-word';
        if(!cd['overflow-wrap'])cd['overflow-wrap']='break-word';

    }

    const ts={};for(const k of['background-color','border','border-radius','padding','width','max-width'])if(d[k])ts[k]=d[k];
    ts['border-collapse']='separate';

    let colGap=(d['column-gap']||'0').split(' ')[0]||'0';
    ts['border-spacing']=`${colGap} ${rowGap}`;
    if(!ts['width'])ts['width']='100%';

    ts['table-layout']=isCardGrid?'fixed':'auto';ts['margin']='0 0 0 0';
    const justify=d['justify-content']||'';
    const n=children.length;
    let colW=pxTracksToPercents(d['grid-template-columns']);
    let cols;
    if(colW&&colW.length>0&&disp==='grid'){cols=colW.length;}
    else{cols=n;colW=Array.from({length:cols},()=>((100/cols).toFixed(2)+'%'));}
    // 移动端：卡片多于 4 列折叠成 2 列，防窄列文字溢出

          if(cv&&!cd['width'])cd['width']='100%';
          if(cv){if(!cd['word-break'])cd['word-break']='break-word';if(!cd['overflow-wrap'])cd['overflow-wrap']='break-word';}
          ['flex','flex-direction','justify-content','align-items','flex-wrap','grid-template-columns','row-gap','column-gap'].forEach(k=>delete cd[k]);
          if(/^(flex|grid)$/.test(cd['display']||'')){
            if(cv||cd['width']||cd['height']){cd['display']='inline-block';if(cv&&!cd['text-align'])cd['text-align']='center';}

          }
          setDecl(child,cd);setDecl(td,tds);
          td.appendChild(child);
        }else{setDecl(td,tds);td.innerHTML='&nbsp;';}
        const w=tds['width'];if(w&&w.endsWith('%'))td.setAttribute('width',Math.round(parseFloat(w))+'%');
        tr.appendChild(td);
      }
      table.appendChild(tr);
    }
    // 清容器残留 flex/grid 属性
    const d2=getDecl(host);['display','flex-direction','justify-content','align-items','flex-wrap','grid-template-columns','row-gap','column-gap','border','padding'].forEach(k=>delete d2[k]);
    setDecl(host,d2);
    host.appendChild(table);
  }
}
/* ---------- 步骤3：div 背景/边框/居中 -> section ---------- */
function divToSection(doc){
  for(const el of Array.from(doc.body.querySelectorAll('div'))){
    const d=getDecl(el);
    const hasBg=d['background-color']||d['background'];
    const hasBorder=['border','border-top','border-right','border-bottom','border-left'].some(k=>d[k]);
    const hasPad=Object.keys(d).some(k=>k.startsWith('padding'));
    const hasBox=hasBorder&&hasPad;
    const align=['center','right','justify'].includes(d['text-align']);
    const deco=!el.textContent.trim()&&(hasBg||hasBox);
    if(hasBg||hasBox||align||deco)renameTag(el,'section');
  }
}
/* ---------- 步骤4：tr 背景 -> td（斑马纹加固） ---------- */
function propagateTrBg(doc){

    const d=getDecl(tr);const bg=d['background-color']||d['background'];if(!bg)continue;
    for(const cell of Array.from(tr.children)){if(!['TD','TH'].includes(cell.tagName))continue;const cd=getDecl(cell);if(!cd['background-color']&&!cd['background']){cd['background-color']=bg;setDecl(cell,cd);}}

}
/* ---------- 步骤5：中和微信强加的表格网格边框 ---------- */
function neutralizeTableBorders(doc){

/* ---------- 步骤6：SVG -> PNG（Canvas 栅格化） ---------- */
function svgToPng(svg){
  return new Promise(resolve=>{
    try{
      const clone=svg.cloneNode(true);
      let w=parseFloat(svg.getAttribute('width'))||0,h=parseFloat(svg.getAttribute('height'))||0;
      if((!w||!h)&&svg.getAttribute('viewBox')){const vb=svg.getAttribute('viewBox').split(/[ ,]+/).map(Number);if(vb.length===4){w=w||vb[2];h=h||vb[3];}}
      if(!w||!h){const r=svg.getBoundingClientRect();w=w||r.width||600;h=h||r.height||400;}
      clone.setAttribute('xmlns','http://www.w3.org/2000/svg');
      clone.setAttribute('width',w);clone.setAttribute('height',h);
      const xml=new XMLSerializer().serializeToString(clone);
      const svg64='data:image/svg+xml;charset=utf-8,'+encodeURIComponent(xml);
      const img=new Image();const scale=2;
      img.onload=()=>{try{const cv=document.createElement('canvas');cv.width=w*scale;cv.height=h*scale;const ctx=cv.getContext('2d');ctx.setTransform(scale,0,0,scale,0,0);ctx.drawImage(img,0,0,w,h);resolve({url:cv.toDataURL('image/png'),w,h});}catch(e){resolve(null);}};
      img.onerror=()=>resolve(null);
      img.src=svg64;
    }catch(e){resolve(null);}
  });
}
/* ---------- 步骤6b：canvas（Chart.js 等）-> PNG ---------- */
function canvasToImg(doc,warns){
  const cans=Array.from(doc.body.querySelectorAll('canvas'));
  let n=0;
  for(const c of cans){
    let url=null;
    try{url=c.toDataURL('image/png');}catch(e){url=null;}
    if(!url||url==='data:image/png;base64,'){url=null;}
    const isBlank=(url&&url.length<500);   // 空白画布 dataURL 极短；真实图表 PNG 远超此值
    if(!url||isBlank){
      warns.push('有 canvas 图表未能渲染（可能图表库未加载/跨域），已留原标签');
      continue;
    }
    // 用「显示尺寸」而非高 DPI 后备分辨率，避免微信里被拉伸变形
    const r=c.getBoundingClientRect();
    const w=Math.round(r.width)||(c.getAttribute('width')?parseInt(c.getAttribute('width')):0);
    const h=Math.round(r.height)||(c.getAttribute('height')?parseInt(c.getAttribute('height')):0);
    const img=doc.createElement('img');
    img.src=url;
    img.alt=c.getAttribute('aria-label')||c.id||'图表';
    if(w)img.setAttribute('width',w);
    if(h)img.setAttribute('height',h);
    img.setAttribute('style','max-width:100%;height:auto;display:block;margin:0 auto');
    c.parentNode.replaceChild(img,c);
    n++;
  }
  return n;
}
async function handleSvgAndImages(doc,imgMap,warns){
  const svgs=Array.from(doc.body.querySelectorAll('svg'));
  for(const svg of svgs){
    const png=await svgToPng(svg);
    if(png){const img=doc.createElement('img');img.src=png.url;img.alt=svg.getAttribute('aria-label')||'图表';if(png.w)img.setAttribute('width',Math.round(png.w));img.setAttribute('style','max-width:100%;height:auto;display:block;margin:0 auto;');svg.parentNode.replaceChild(img,svg);}
    else{warns.push('有 SVG 无法自动转图，已保留（可能粘贴后不显示）');}
  }
  // 本地/相对图片：按文件名从 imgMap 内嵌
  for(const img of Array.from(doc.body.querySelectorAll('img'))){
    let src=img.getAttribute('src')||'';if(!src||src.startsWith('data:'))continue;
    if(/^https?:\/\//i.test(src))continue;
    const name=src.split(/[\\/]/).pop().split('?')[0];
    if(imgMap[name]){img.setAttribute('src',imgMap[name]);}
    else if(imgMap[src]){img.setAttribute('src',imgMap[src]);}
    else warns.push('本地图片未找到: '+name+'（把该图片一起拖进来即可内嵌）');
  }
  // 背景图 url() 内嵌
  for(const el of Array.from(doc.body.querySelectorAll('[style*="url("]'))){
    let st=el.getAttribute('style');
    const nst=st.replace(/url\(\s*(['"]?)([^'")]+)\1\s*\)/gi,(m,q,u)=>{
      if(u.startsWith('data:')||/^https?:\/\//i.test(u))return m;
      const nm=u.split(/[\\/]/).pop().split('?')[0];
      if(imgMap[nm])return`url("${imgMap[nm]}")`;
      if(imgMap[u])return`url("${imgMap[u]}")`;
      return m;
    });
    if(nst!==st)el.setAttribute('style',nst);
  }
}
/* ---------- 步骤7：清理 & 包裹根 section ---------- */
function cleanup(doc){
  doc.body.querySelectorAll('script,style,link,meta,noscript').forEach(n=>n.remove());
  const walker=doc.createTreeWalker(doc.body,NodeFilter.SHOW_COMMENT,null);const rm=[];let c;while((c=walker.nextNode()))rm.push(c);rm.forEach(n=>n.remove());

    for(const a of Array.from(el.attributes)){if(a.name.toLowerCase().startsWith('on'))el.removeAttribute(a.name);}

function wrapRoot(doc,bodyStyle){

function encodeEntities(s){let out='';for(const ch of s){const cp=ch.codePointAt(0);out+=cp>127?`&#${cp};`:ch;}return out;}

/* ---------- 极简 Markdown -> HTML ---------- */
function mdToHtml(md){
  const esc=s=>s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  const lines=md.replace(/\r\n?/g,'\n').split('\n');
  let html='',i=0;
  const inline=t=>esc(t)
    .replace(/`([^`]+)`/g,'<code style="background:#f2f3f5;padding:2px 5px;border-radius:4px;font-family:monospace">$1</code>')
    .replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>')
    .replace(/\*([^*]+)\*/g,'<em>$1</em>')
    .replace(/!\[([^\]]*)\]\(([^)]+)\)/g,'<img src="$2" alt="$1" style="max-width:100%">')
    .replace(/\[([^\]]+)\]\(([^)]+)\)/g,'<a href="$2">$1</a>');
  while(i<lines.length){
    let l=lines[i];
    if(/^```/.test(l)){let code='';i++;while(i<lines.length&&!/^```/.test(lines[i])){code+=lines[i]+'\n';i++;}i++;html+=`<pre style="background:#f6f7f9;padding:14px;border-radius:8px;overflow:auto"><code style="font-family:monospace;font-size:13px">${esc(code)}</code></pre>`;continue;}
    let m=l.match(/^(#{1,6})\s+(.*)/);
    if(m){const lv=m[1].length;const sz=[0,26,22,19,17,15,14][lv];html+=`<h${lv} style="font-size:${sz}px;font-weight:700;margin:22px 0 12px">${inline(m[2])}</h${lv}>`;i++;continue;}
    if(/^\s*[-*+]\s+/.test(l)){let items='';while(i<lines.length&&/^\s*[-*+]\s+/.test(lines[i])){items+=`<li style="margin:5px 0">${inline(lines[i].replace(/^\s*[-*+]\s+/,''))}</li>`;i++;}html+=`<ul style="padding-left:22px;margin:12px 0">${items}</ul>`;continue;}
    if(/^\s*\d+\.\s+/.test(l)){let items='';while(i<lines.length&&/^\s*\d+\.\s+/.test(lines[i])){items+=`<li style="margin:5px 0">${inline(lines[i].replace(/^\s*\d+\.\s+/,''))}</li>`;i++;}html+=`<ol style="padding-left:22px;margin:12px 0">${items}</ol>`;continue;}
    if(/^>\s?/.test(l)){let q='';while(i<lines.length&&/^>\s?/.test(lines[i])){q+=inline(lines[i].replace(/^>\s?/,''))+'<br>';i++;}html+=`<blockquote style="border-left:3px solid #07c160;padding:8px 14px;margin:12px 0;color:#646a73;background:#f7f8fa">${q}</blockquote>`;continue;}
    if(/^\s*([-*_])\1{2,}\s*$/.test(l)){html+='<hr style="border:0;border-top:1px solid #e4e7ec;margin:20px 0">';i++;continue;}
    if(l.includes('|')&&i+1<lines.length&&/^\s*\|?[\s:|-]+\|?\s*$/.test(lines[i+1])){
      const parse=r=>r.replace(/^\||\|$/g,'').split('|').map(c=>c.trim());
      const head=parse(l);i+=2;let body='';
      while(i<lines.length&&lines[i].includes('|')){const cells=parse(lines[i]);body+='<tr>'+cells.map(c=>`<td style="border:1px solid #e4e7ec;padding:8px 10px">${inline(c)}</td>`).join('')+'</tr>';i++;}
      html+=`<table style="border-collapse:collapse;width:100%;margin:14px 0"><thead><tr>${head.map(c=>`<th style="border:1px solid #e4e7ec;padding:8px 10px;background:#f6f7f9;text-align:left">${inline(c)}</th>`).join('')}</tr></thead><tbody>${body}</tbody></table>`;continue;
    }
    if(l.trim()===''){i++;continue;}
    let para=l;while(i+1<lines.length&&lines[i+1].trim()!==''&&!/^(#{1,6}\s|```|>|\s*[-*+]\s|\s*\d+\.\s)/.test(lines[i+1])){i++;para+=' '+lines[i];}
    html+=`<p style="margin:12px 0">${inline(para)}</p>`;i++;
  }
  return html;
}
/* ---------- 主转换流程 ---------- */
function loadIntoSandbox(rawHtml){

/* 等图表库（Chart.js 等）异步渲染完成：轮询画布像素，直到不再变化（动画结束） */
function waitForRender(win){
  return new Promise(resolve=>{
    const doc=win.document;
    let waited=0;const step=150;const maxWait=7000;
    let prev=null,stable=0;
    const snap=()=>{
      const cans=doc.querySelectorAll('canvas');
      if(!cans.length)return null;
      let s='';
      for(const c of cans){try{s+=(c.toDataURL().length)+':'+c.width+'x'+c.height+';';}catch(e){s+='e;';}}
      return s;
    };
    const tick=()=>{
      waited+=step;
      if(doc.readyState!=='complete'){if(waited<maxWait)setTimeout(tick,step);else resolve();return;}
      const cans=doc.querySelectorAll('canvas');
      if(!cans.length){resolve();return;}            // 无图表，直接走后续流程
      const cur=snap();
      if(cur!==null&&cur===prev)stable++;else{stable=0;prev=cur;}
      // 连续两次快照一致（≈300ms 无变化）即认为动画已结束
      if(stable>=2||waited>=maxWait)resolve();
      else setTimeout(tick,step);
    };
    tick();
  });
}
async function convert(rawHtml,{isMarkdown=false,imgMap={},entities=true}={}){

  flexGridToTable(doc);
  divToSection(doc);
  propagateTrBg(doc);
  neutralizeTableBorders(doc);
  await handleSvgAndImages(doc,imgMap,warns);
  cleanup(doc);
  const root=wrapRoot(doc,bodyStyle);
  let out=root.outerHTML;
  const stats={rules:doc.body?0:0,imgs:doc.body.querySelectorAll('img').length,tables:doc.body.querySelectorAll('table').length,sections:doc.body.querySelectorAll('section').length};
  const raw=out; // 供预览（真实字符）
  if(entities)out=encodeEntities(out);
  return{html:out,raw,stats,warns:[...new Set(warns)]};
}

/* ================================================================
 *  UI 交互
 * ================================================================ */
const $=s=>document.querySelector(s);
let inputMode='html',outView='preview',lastResult=null,imgMap={};

function toast(msg,err){const t=$('#toast');t.textContent=msg;t.className='toast show'+(err?' err':'');setTimeout(()=>t.className='toast',1900);}

$('#srcBody').querySelectorAll&&document.querySelectorAll('.tabs .tab[data-mode]').forEach(t=>t.onclick=()=>{document.querySelectorAll('.tab[data-mode]').forEach(x=>x.classList.remove('on'));t.classList.add('on');inputMode=t.dataset.mode;$('#src').placeholder=inputMode==='md'?'在此粘贴 Markdown 文本…':'在此粘贴带 <style> 的 HTML 源码，或拖入文件…';});
document.querySelectorAll('.tab[data-view]').forEach(t=>t.onclick=()=>{document.querySelectorAll('.tab[data-view]').forEach(x=>x.classList.remove('on'));t.classList.add('on');outView=t.dataset.view;syncView();});
function syncView(){const pv=outView==='preview';$('#prevWrap').style.display=pv?'flex':'none';$('#outCode').style.display=pv?'none':'block';}

$('#btnClear').onclick=()=>{$('#src').value='';};
$('#btnSample').onclick=()=>{$('#src').value=SAMPLE_HTML;document.querySelector('.tab[data-mode="html"]').click();toast('已载入示例，点「转换」试试');};

$('#fileHtml').onchange=e=>{const f=e.target.files[0];if(!f)return;const fr=new FileReader();fr.onload=()=>{$('#src').value=fr.result;const md=/\.(md|markdown)$/i.test(f.name);document.querySelector(`.tab[data-mode="${md?'md':'html'}"]`).click();toast('已导入 '+f.name);};fr.readAsText(f,'utf-8');e.target.value='';};
$('#fileImg').onchange=e=>{const fs=Array.from(e.target.files);let done=0;if(!fs.length)return;fs.forEach(f=>{const fr=new FileReader();fr.onload=()=>{imgMap[f.name]=fr.result;if(++done===fs.length)toast(`已添加 ${fs.length} 张图片，转换时按文件名内嵌`);};fr.readAsDataURL(f);});e.target.value='';};

// 拖拽
const drop=$('#drop'),srcBody=$('#srcBody');let dragc=0;
srcBody.addEventListener('dragenter',e=>{e.preventDefault();dragc++;drop.classList.add('show');});
srcBody.addEventListener('dragover',e=>e.preventDefault());
srcBody.addEventListener('dragleave',e=>{if(--dragc<=0)drop.classList.remove('show');});
srcBody.addEventListener('drop',e=>{e.preventDefault();dragc=0;drop.classList.remove('show');const files=Array.from(e.dataTransfer.files);let imgs=0;files.forEach(f=>{if(/^image\//.test(f.type)){const fr=new FileReader();fr.onload=()=>{imgMap[f.name]=fr.result;};fr.readAsDataURL(f);imgs++;}else{const fr=new FileReader();fr.onload=()=>{$('#src').value=fr.result;const md=/\.(md|markdown)$/i.test(f.name);document.querySelector(`.tab[data-mode="${md?'md':'html'}"]`).click();};fr.readAsText(f,'utf-8');}});if(imgs)toast(`已添加 ${imgs} 张图片`);});

$('#btnConvert').onclick=async()=>{
  const raw=$('#src').value.trim();
  if(!raw){toast('请先粘贴 HTML / Markdown',true);return;}
  const btn=$('#btnConvert');btn.disabled=true;btn.textContent='转换中…';
  try{
    const res=await convert(raw,{isMarkdown:inputMode==='md',imgMap,entities:$('#optEntities').checked});
    lastResult=res;
    $('#emptyState').style.display='none';
    // 预览
    const pf=$('#preview');const pdoc=pf.contentDocument;
    pdoc.open();pdoc.write(`<!DOCTYPE html><html><head><meta charset="utf-8"><style>body{margin:0;padding:16px;font-family:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;color:#2b2f36;-webkit-font-smoothing:antialiased}img{max-width:100%}</style></head><body>${res.raw}</body></html>`);pdoc.close();
    setTimeout(()=>{try{pf.style.height=Math.max(200,pdoc.body.scrollHeight+32)+'px';}catch(e){}},60);
    // 代码
    $('#outCode').value='\ufeff'+res.html;
    // 统计
    $('#stats').innerHTML=`<span><b>${res.stats.imgs}</b> 图片</span><span><b>${res.stats.tables}</b> 表格</span><span><b>${res.stats.sections}</b> section</span><span><b>${(new Blob([res.html]).size/1024).toFixed(1)}</b> KB</span>`;
    // 警告
    const wb=$('#warnBox');if(res.warns.length){wb.innerHTML='&#9888; '+res.warns.join(' &middot; ');wb.classList.add('show');}else wb.classList.remove('show');
    $('#btnCopy').disabled=false;$('#btnDownload').disabled=false;
    syncView();toast('转换完成，可复制到公众号');
  }catch(err){console.error(err);toast('转换失败: '+err.message,true);}
  finally{btn.disabled=false;btn.innerHTML='&#9889; 转换';}
};

$('#btnCopy').onclick=async()=>{
  if(!lastResult)return;
  const html=lastResult.raw;
  try{
    const item=new ClipboardItem({'text/html':new Blob([html],{type:'text/html'}),'text/plain':new Blob([html],{type:'text/plain'})});
    await navigator.clipboard.write([item]);
    toast('已复制！去公众号编辑器 Ctrl/Cmd+V 粘贴');
  }catch(e){
    try{await navigator.clipboard.writeText(lastResult.html);toast('已复制 HTML 文本');}
    catch(e2){$('#outCode').style.display='block';$('#outCode').select();document.execCommand('copy');toast('已复制代码');}
  }
};
$('#btnDownload').onclick=()=>{
  if(!lastResult)return;
  const blob=new Blob(['\ufeff',lastResult.html],{type:'text/html;charset=utf-8'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='wechat.html';a.click();setTimeout(()=>URL.revokeObjectURL(a.href),1000);
  toast('已下载 wechat.html');
};
syncView();
